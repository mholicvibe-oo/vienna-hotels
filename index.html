<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="비엔나 여행">
<title>🇦🇹 비엔나 여행 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f4ef; --bg2:#f0ece4; --surface:#fff; --surface2:#f7f4ef;
  --border:rgba(0,0,0,.08); --border2:rgba(0,0,0,.14);
  --text:#1a1814; --text2:#4a453e; --muted:#8a8278; --dim:#b8b2aa;
  --gold:#b8862a; --gold2:#d4a340; --goldbg:#fdf3e0;
  --rose:#b54060; --rosebg:#fdeef3;
  --teal:#1f8a80; --tealbg:#e6f6f4;
  --blue:#2c6dbf; --bluebg:#e8f0fb;
  --sage:#3d7a50; --sagebg:#ebf5ef;
  --purple:#5b3fa0; --purplebg:#eeebfb;
  --safe:env(safe-area-inset-bottom,0px); --top:env(safe-area-inset-top,0px);
  --tab-h:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;padding-bottom:24px}

/* ── HEADER + TABS ── */
.hdr{padding:calc(var(--top)+18px) 20px 0;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.hdr-top{padding-bottom:12px}
.hdr-lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:4px}
.hdr-title{font-family:'DM Serif Display',serif;font-size:26px;line-height:1.15;color:var(--text)}
.hdr-title em{font-style:italic;color:var(--gold2)}
.hdr-sub{font-size:12px;color:var(--muted);font-weight:300;margin-top:2px}

.tabnav{display:flex;border-top:1px solid var(--border);background:var(--surface)}
.tnav{flex:1;position:relative;padding:0;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;height:var(--tab-h);justify-content:center;transition:color .2s}
.tnav .ticon{font-size:18px;line-height:1}
.tnav::after{content:'';position:absolute;bottom:0;left:12%;right:12%;height:3px;border-radius:2px 2px 0 0;background:var(--gold);transform:scaleX(0);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.tnav.active{color:var(--gold);font-weight:600}
.tnav.active::after{transform:scaleX(1)}
.tbdg{display:inline-block;font-size:9px;font-weight:600;padding:1px 5px;border-radius:10px;background:var(--goldbg);color:var(--gold);margin-left:3px;vertical-align:middle;border:1px solid rgba(184,134,42,.2)}
.tbdg-t{background:var(--tealbg);color:var(--teal);border-color:rgba(31,138,128,.2)}

/* ── PANELS ── */
.panel{display:none;padding:12px 14px 40px}
.panel.active{display:block}

/* ══ SCHEDULE ══ */
.day-group{margin-bottom:4px}
.day-hdr{padding:16px 2px 8px;display:flex;flex-direction:column;gap:4px}
.day-date{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;color:var(--text);line-height:1.1}
.day-name{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.day-travel{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.travel-chip{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--muted);border:1px solid var(--border)}
.day-divider{height:1px;background:var(--border);margin-bottom:8px}

/* Hotel chip */
.hotel-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:4px 10px;border-radius:8px;background:var(--goldbg);color:var(--gold);border:1px solid rgba(184,134,42,.25);margin-bottom:8px}

.sc-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04);transition:box-shadow .2s}
.sc-card.open{box-shadow:0 3px 12px rgba(0,0,0,.08)}
.sc-head{display:flex;align-items:stretch;cursor:pointer;user-select:none}
.sc-stripe{width:4px;flex-shrink:0}
.sc-main{flex:1;padding:12px 12px 12px;min-width:0}
.sc-time{font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:500;letter-spacing:.03em}
.sc-title{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:6px}
.sc-badges{display:flex;gap:4px;flex-wrap:wrap}
.sc-arr{width:36px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:18px;transition:transform .25s;flex-shrink:0}
.sc-card.open .sc-arr{transform:rotate(90deg)}
.sc-body{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1)}
.sc-card.open .sc-body{max-height:900px}
.sc-inner{padding:0 12px 14px;border-top:1px solid var(--border)}

/* Hotel start indicator */
.hotel-start{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--goldbg);border:1px solid rgba(184,134,42,.2);border-radius:8px;margin-top:10px;font-size:12px;color:var(--gold)}
.hotel-start strong{font-weight:600}

/* Travel time summary */
.route-summary{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0 4px}
.route-chip{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;background:var(--bg2);color:var(--text2);border:1px solid var(--border)}

.map-embed{width:100%;height:200px;border-radius:10px;overflow:hidden;margin:10px 0 8px;background:var(--bg2);position:relative;border:1px solid var(--border)}
.map-embed iframe{width:100%;height:100%;border:none;display:block}
.map-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted)}

.confirmed-box{display:flex;align-items:center;gap:8px;background:var(--sagebg);border:1px solid rgba(61,122,80,.2);border-radius:8px;padding:8px 12px;margin:8px 0}
.confirmed-text{font-size:12px;color:var(--sage);font-weight:500}
.confirmed-sub{font-size:11px;color:var(--sage);opacity:.7}

.map-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.mb{display:flex;align-items:center;gap:4px;padding:7px 11px;border-radius:8px;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:transform .15s;white-space:nowrap}
.mb:active{transform:scale(.96)}
.mb-map{background:var(--tealbg);color:var(--teal);border:1px solid rgba(31,138,128,.25)}
.mb-dir{background:var(--bluebg);color:var(--blue);border:1px solid rgba(44,109,191,.25)}
.mb-route{background:var(--goldbg);color:var(--gold);border:1px solid rgba(184,134,42,.25)}

.sc-details{margin:8px 0}
.sc-details li{font-size:13px;color:var(--text2);padding:3px 0;list-style:none;display:flex;gap:8px;line-height:1.55}
.sc-details li::before{content:'·';color:var(--dim);flex-shrink:0}
.sc-details li strong{color:var(--text);font-weight:600}
.sc-note{padding:8px 10px;background:var(--goldbg);border:1px solid rgba(184,134,42,.2);border-radius:8px;font-size:12px;color:var(--gold);line-height:1.5;margin-top:8px}

/* Badges */
.b{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px}
.b-fl{background:var(--purplebg);color:var(--purple);border:1px solid rgba(91,63,160,.2)}
.b-ro{background:#fdeee8;color:#a03a18;border:1px solid rgba(160,58,24,.2)}
.b-na{background:var(--sagebg);color:var(--sage);border:1px solid rgba(61,122,80,.2)}
.b-vi{background:var(--bluebg);color:var(--blue);border:1px solid rgba(44,109,191,.2)}
.b-op{background:var(--rosebg);color:var(--rose);border:1px solid rgba(181,64,96,.2)}
.b-mt{background:var(--tealbg);color:var(--teal);border:1px solid rgba(31,138,128,.2)}
.b-go{background:var(--goldbg);color:var(--gold);border:1px solid rgba(184,134,42,.2)}
.b-wr{background:#fdeef0;color:#b54060;border:1px solid rgba(181,64,96,.2)}
.b-ok{background:var(--sagebg);color:var(--sage);border:1px solid rgba(61,122,80,.3)}
.b-ht{background:var(--goldbg);color:var(--gold);border:1px solid rgba(184,134,42,.3)}

/* ══ TODO / CHECK ══ */
.prog-wrap{padding:6px 2px 0}
.prog-row{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-lbl{font-size:10px;color:var(--muted)}
.prog-num{font-size:10px;color:var(--gold);font-weight:600}
.prog-track{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-bottom:10px;border:1px solid var(--border)}
.prog-fill{height:100%;border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.pf-t{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.pf-c{background:linear-gradient(90deg,var(--teal),var(--sage))}

.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin:18px 0 8px}
.sec-hdr:first-of-type{margin-top:6px}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.sec-cnt{font-size:10px;color:var(--dim)}

.ilist{display:flex;flex-direction:column;gap:5px}
.item{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;background:var(--surface);border:1px solid var(--border);border-radius:11px;cursor:pointer;user-select:none;position:relative;overflow:hidden;transition:box-shadow .15s,border-color .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.item:active{transform:scale(.98)}
.item.done{background:var(--bg2);border-color:var(--border);box-shadow:none}
.item.done::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(31,138,128,.04),transparent);pointer-events:none}
.ichk{width:20px;height:20px;flex-shrink:0;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .25s;margin-top:1px}
.item.done .ichk{background:var(--teal);border-color:var(--teal)}
.ichk svg{opacity:0;transition:opacity .2s}
.item.done .ichk svg{opacity:1}
.ibody{flex:1;min-width:0}
.itxt{font-size:13px;font-weight:400;color:var(--text);line-height:1.4}
.item.done .itxt{color:var(--dim);text-decoration:line-through;text-decoration-color:var(--dim)}
.isub{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4;font-weight:300}
.item.done .isub{color:var(--dim)}
.itag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:20px;flex-shrink:0;align-self:flex-start;margin-top:2px;letter-spacing:.03em}
.t-ur{background:var(--rosebg);color:var(--rose);border:1px solid rgba(181,64,96,.25)}
.t-bk{background:var(--goldbg);color:var(--gold);border:1px solid rgba(184,134,42,.25)}
.t-in{background:var(--bluebg);color:var(--blue);border:1px solid rgba(44,109,191,.25)}
.t-pk{background:var(--sagebg);color:var(--sage);border:1px solid rgba(61,122,80,.25)}
.t-wn{background:#fdeef0;color:var(--rose);border:1px solid rgba(181,64,96,.2)}
.idel{width:18px;height:18px;flex-shrink:0;border-radius:50%;border:none;background:var(--bg2);color:var(--dim);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;align-self:flex-start;margin-top:1px}
.item:hover .idel,.item:active .idel{opacity:1}
.idel:hover{background:var(--rosebg);color:var(--rose)}

.notice{background:var(--rosebg);border:1px solid rgba(181,64,96,.2);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.notice-t{font-size:11px;font-weight:600;color:var(--rose);margin-bottom:3px}
.notice-b{font-size:11px;color:var(--text2);line-height:1.6}

/* ── ADD ITEM with category ── */
.add-wrap{margin-top:10px}
.add-row{display:flex;gap:7px;flex-direction:column}
.add-inputs{display:flex;gap:7px}
.add-in{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s}
.add-in::placeholder{color:var(--dim)}
.add-in:focus{border-color:var(--gold)}
.add-cat{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:10px 10px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text2);outline:none;cursor:pointer;min-width:90px;flex-shrink:0}
.add-cat:focus{border-color:var(--gold)}
.add-btn{width:40px;height:40px;border:none;border-radius:9px;font-size:22px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s}
.add-btn:active{transform:scale(.94)}
.abt{background:var(--gold);color:#fff}
.abc{background:var(--teal);color:#fff}

@keyframes popIn{0%{transform:scale(1)}40%{transform:scale(1.07)}100%{transform:scale(1)}}
.just-done{animation:popIn .3s ease}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-lbl">Vienna Trip 2026</div>
    <div class="hdr-title">4.30 — 5.10 <em>여행 플래너</em></div>
    <div class="hdr-sub">로마 · 비엔나 · 할슈타트</div>
  </div>
  <div class="tabnav">
    <button class="tnav active" id="bt-sched" onclick="switchTab('sched')"><span class="ticon">🗓️</span>일정</button>
    <button class="tnav" id="bt-todo" onclick="switchTab('todo')"><span class="ticon">📋</span>To Do<span class="tbdg" id="tbdg">0</span></button>
    <button class="tnav" id="bt-check" onclick="switchTab('check')"><span class="ticon">✅</span>체크리스트<span class="tbdg tbdg-t" id="cbdg">0</span></button>
  </div>
</div>

<div class="panel active" id="panel-sched"><div id="sched-root"></div></div>

<div class="panel" id="panel-todo">
  <div class="prog-wrap">
    <div class="prog-row"><span class="prog-lbl">완료율</span><span class="prog-num" id="tp-n">0/0</span></div>
    <div class="prog-track"><div class="prog-fill pf-t" id="tp-f" style="width:0%"></div></div>
  </div>
  <div class="sec-hdr"><span class="sec-title">🚨 긴급 예약</span><span class="sec-cnt" id="c-ur"></span></div><div class="ilist" id="l-ur"></div>
  <div class="sec-hdr"><span class="sec-title">🏨 숙소·교통</span><span class="sec-cnt" id="c-tt"></span></div><div class="ilist" id="l-tt"></div>
  <div class="sec-hdr"><span class="sec-title">🎭 현지 예약</span><span class="sec-cnt" id="c-tl"></span></div><div class="ilist" id="l-tl"></div>
  <div class="sec-hdr"><span class="sec-title">📝 기타 준비</span><span class="sec-cnt" id="c-tm"></span></div><div class="ilist" id="l-tm"></div>
  <div class="sec-hdr" style="margin-top:20px"><span class="sec-title">+ 항목 추가</span></div>
  <div class="add-wrap">
    <div class="add-row">
      <div class="add-inputs">
        <select class="add-cat" id="todo-cat">
          <option value="ur">🚨 긴급 예약</option>
          <option value="tt">🏨 숙소·교통</option>
          <option value="tl">🎭 현지 예약</option>
          <option value="tm" selected>📝 기타 준비</option>
        </select>
        <select class="add-cat" id="todo-tag" style="min-width:80px">
          <option value="ur">긴급</option>
          <option value="bk">예약</option>
          <option value="in">정보</option>
          <option value="pk" selected>챙기기</option>
        </select>
      </div>
      <div class="add-inputs">
        <input class="add-in" id="ti" placeholder="할 일 입력..." maxlength="80">
        <button class="add-btn abt" onclick="addIt('t')">+</button>
      </div>
    </div>
  </div>
</div>

<div class="panel" id="panel-check">
  <div class="prog-wrap">
    <div class="prog-row"><span class="prog-lbl">완료율</span><span class="prog-num" id="cp-n">0/0</span></div>
    <div class="prog-track"><div class="prog-fill pf-c" id="cp-f" style="width:0%"></div></div>
  </div>
  <div class="notice"><div class="notice-t">⚠️ 출발 3일 전부터 순서대로 체크</div><div class="notice-b">여권 유효기간: 귀국일 기준 6개월 이상 필수</div></div>
  <div class="sec-hdr"><span class="sec-title">🪪 필수 서류</span><span class="sec-cnt" id="c-cd"></span></div><div class="ilist" id="l-cd"></div>
  <div class="sec-hdr"><span class="sec-title">💊 건강·의약품</span><span class="sec-cnt" id="c-ch"></span></div><div class="ilist" id="l-ch"></div>
  <div class="sec-hdr"><span class="sec-title">👗 의류·용품</span><span class="sec-cnt" id="c-cc"></span></div><div class="ilist" id="l-cc"></div>
  <div class="sec-hdr"><span class="sec-title">📱 전자기기</span><span class="sec-cnt" id="c-ct"></span></div><div class="ilist" id="l-ct"></div>
  <div class="sec-hdr"><span class="sec-title">🚨 여행 중 주의사항</span><span class="sec-cnt" id="c-cw"></span></div><div class="ilist" id="l-cw"></div>
  <div class="sec-hdr" style="margin-top:20px"><span class="sec-title">+ 항목 추가</span></div>
  <div class="add-wrap">
    <div class="add-row">
      <div class="add-inputs">
        <select class="add-cat" id="check-cat">
          <option value="cd">🪪 필수 서류</option>
          <option value="ch">💊 건강·의약품</option>
          <option value="cc">👗 의류·용품</option>
          <option value="ct">📱 전자기기</option>
          <option value="cw" selected>🚨 주의사항</option>
        </select>
        <select class="add-cat" id="check-tag" style="min-width:80px">
          <option value="ur">긴급</option>
          <option value="bk">예약</option>
          <option value="in">정보</option>
          <option value="pk" selected>챙기기</option>
          <option value="wn">주의</option>
        </select>
      </div>
      <div class="add-inputs">
        <input class="add-in" id="ci" placeholder="체크 항목 입력..." maxlength="80">
        <button class="add-btn abc" onclick="addIt('c')">+</button>
      </div>
    </div>
  </div>
</div>

<script>
const GMAP_KEY = 'AIzaSyAI7UiCreT29nI95BVbCm_j8qCdqt0rpgk';

/* ══════════════════════════
   HOTELS
══════════════════════════ */
const HOTELS = {
  rome: {
    name: 'Sina Bernini Bristol, Autograph Collection',
    addr: 'Piazza Barberini 23, Roma',
    lat: 41.9010, lng: 12.4883,
    q: 'Sina Bernini Bristol Autograph Collection Rome'
  },
  vienna: {
    name: 'A by Adina Vienna Danube',
    addr: 'Wagramer Strasse 2, 1220 Wien',
    lat: 48.2320, lng: 16.4090,
    q: 'A by Adina Vienna Danube Hotel'
  }
};

/* ══════════════════════════
   SCHEDULE DATA
   start: hotel key ('rome'|'vienna'|null)
   Each day begins from the hotel, so first map includes hotel→first stop
══════════════════════════ */
const DAYS = [
  {
    date:'4월 30일 목요일', flag:'🇮🇹', label:'인천 출발 → 로마 도착',
    hotel: null,
    travel:{ total:'약 12시간', km:'약 9,200 km', walk:'도보 약 3 km' },
    events:[
      { time:'12:15', title:'인천국제공항 T1 출발 ✈️', color:'#5b3fa0',
        badges:[{t:'ICN→FCO',c:'b-fl'},{t:'직항 약 12h',c:'b-go'}],
        route:{ time:'비행 12시간', km:'9,200 km', mode:'✈️' },

/* ══ STATE ══ */
let ST={};
function ldST(){try{const s=localStorage.getItem('vt26c');if(s)ST=JSON.parse(s);}catch(e){}}
function svST(){try{localStorage.setItem('vt26c',JSON.stringify(ST));}catch(e){}}

/* ══ MAP ══ */
function buildMapUrl(places){
  if(!places||!places.length)return null;
  if(places.length===1)return `https://www.google.com/maps/embed/v1/place?key=${GMAP_KEY}&q=${encodeURIComponent(places[0].q)}&zoom=15&language=ko`;
  const o=encodeURIComponent(places[0].q),d=encodeURIComponent(places[places.length-1].q);
  let url=`https://www.google.com/maps/embed/v1/directions?key=${GMAP_KEY}&origin=${o}&destination=${d}&language=ko&mode=transit`;
  if(places.length>2){url+=`&waypoints=${places.slice(1,-1).map(p=>encodeURIComponent(p.q)).join('|')}`;}
  return url;
}
function openGMap(places){
  if(!places||!places.length)return;
  if(places.length===1){window.open(`https://www.google.com/maps/search/${encodeURIComponent(places[0].q)}`,'_blank');return;}
  window.open(`https://www.google.com/maps/dir/${places.map(p=>encodeURIComponent(p.q)).join('/')}`,'_blank');
}
function openNav(place){window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(place.q)}&travelmode=transit`,'_blank');}

/* ══ COUNTRY LABEL ══ */
const COUNTRY_MAP={
  '🇰🇷':{label:'🇰🇷 대한민국',bg:'#fff0f0',color:'#cc0000'},
  '🇮🇹':{label:'🇮🇹 이탈리아',bg:'#fff7e6',color:'#c86400'},
  '🏖️':{label:'🇮🇹 이탈리아 · 해변',bg:'#e6f6f4',color:'#0f6e56'},
  '✈️':{label:'✈️ 이동일',bg:'#f0eefb',color:'#5b3fa0'},
  '🇦🇹':{label:'🇦🇹 오스트리아',bg:'#fdeef3',color:'#b54060'},
};

/* ══ SCHEDULE RENDER ══ */
function buildSched(){
  const root=document.getElementById('sched-root');
  root.innerHTML='';
  DAYS.forEach((day,di)=>{
    const grp=document.createElement('div');
    grp.className='day-group';

    // Country banner
    const ctry=COUNTRY_MAP[day.flag]||{label:day.flag,bg:'#f7f4ef',color:'#8a8278'};
    const banner=document.createElement('div');
    banner.style.cssText=`background:${ctry.bg};color:${ctry.color};font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;display:inline-flex;align-items:center;gap:4px;margin:12px 2px 4px;letter-spacing:.04em`;
    banner.textContent=ctry.label;
    grp.appendChild(banner);

    // Day header
    const hdr=document.createElement('div');
    hdr.className='day-hdr';
    const dateEl=document.createElement('div');
    dateEl.className='day-date';
    dateEl.textContent=day.date;
    const nameEl=document.createElement('div');
    nameEl.className='day-name';
    nameEl.textContent=day.label;
    const trvEl=document.createElement('div');
    trvEl.className='day-travel';
    if(day.travel){
      [{icon:'⏱️',val:day.travel.total},{icon:'📍',val:day.travel.km},{icon:'🚶',val:day.travel.walk}].forEach(c=>{
        const chip=document.createElement('span');
        chip.className='travel-chip';
        chip.textContent=c.icon+' '+c.val;
        trvEl.appendChild(chip);
      });
    }
    hdr.appendChild(dateEl); hdr.appendChild(nameEl); hdr.appendChild(trvEl);
    grp.appendChild(hdr);

    // Hotel chip - large, always visible
    if(day.hotel && HOTELS[day.hotel]){
      const h=HOTELS[day.hotel];
      const hotelDiv=document.createElement('div');
      hotelDiv.style.cssText='cursor:pointer;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;margin-bottom:10px;background:var(--goldbg);border:1.5px solid rgba(184,134,42,.35);box-shadow:0 1px 6px rgba(184,134,42,.10)';
      hotelDiv.innerHTML=`<span style="font-size:24px;flex-shrink:0">🏨</span><div style="min-width:0"><div style="font-size:13px;font-weight:700;color:var(--gold)">${h.name}</div><div style="font-size:11px;color:var(--gold);opacity:.7;margin-top:2px">${h.addr} · 지도 보기 →</div></div>`;
      hotelDiv.onclick=()=>window.open(`https://www.google.com/maps/search/${encodeURIComponent(h.q)}`,'_blank');
      grp.appendChild(hotelDiv);
    }

    const divider=document.createElement('div');
    divider.className='day-divider';
    grp.appendChild(divider);

    day.events.forEach((ev,ei)=>grp.appendChild(buildCard(ev,di,ei)));
    root.appendChild(grp);
  });
}

function buildCard(ev,di,ei){
  const id=`c${di}_${ei}`;
  const el=document.createElement('div');
  el.className='sc-card'; el.id=id;

  const bHtml=(ev.badges||[]).map(b=>`<span class="b ${b.c}">${b.t}</span>`).join('');
  const dHtml=(ev.details||[]).map(d=>`<li>${d}</li>`).join('');
  const mapUrl=buildMapUrl(ev.places);

  // Route summary
  let routeHtml='';
  if(ev.route){
    routeHtml=`<div class="route-summary">
      <span class="route-chip">${ev.route.mode}</span>
      <span class="route-chip">⏱️ ${ev.route.time}</span>
      <span class="route-chip">📍 ${ev.route.km}</span>
    </div>`;
  }

  let mapHtml='';
  if(mapUrl){
    mapHtml=`<div class="map-embed"><div class="map-loading">지도 로딩 중...</div>
      <iframe src="${mapUrl}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"
        onload="this.previousElementSibling.style.display='none'"
        onerror="this.parentElement.innerHTML='<div class=map-loading style=text-align:center;padding:1rem>지도를 불러올 수 없습니다</div>'">
      </iframe></div>`;
  }

  let admHtml='';
  if(ev.admission){
    admHtml=`<div style="display:flex;align-items:center;gap:6px;padding:7px 10px;background:#fdeef3;border:1px solid rgba(181,64,96,.2);border-radius:8px;margin:8px 0 4px;font-size:12px;color:#b54060;font-weight:600">⏰ 입장 제한: ${ev.admission}</div>`;
  }

  let confHtml='';
  if(ev.confirmed){
    confHtml=`<div class="confirmed-box"><span style="font-size:16px">🎟️</span>
      <div><div class="confirmed-text">예약 완료 — 예약번호 ${ev.confirmed.no}</div>
      <div class="confirmed-sub">공연 시간: ${ev.confirmed.time} · 빈 국립오페라극장</div></div></div>`;
  }

  let btnHtml='';
  if(ev.places&&ev.places.length){
    const pj=JSON.stringify(ev.places).replace(/"/g,'&quot;');
    const fj=JSON.stringify(ev.places[0]).replace(/"/g,'&quot;');
    btnHtml=`<div class="map-btns">
      <button class="mb mb-map" onclick='openGMap(${pj})'>📍 구글맵 열기</button>
      <button class="mb mb-dir" onclick='openNav(${fj})'>🧭 길찾기</button>
      ${ev.places.length>1?`<button class="mb mb-route" onclick='openGMap(${pj})'>🗺️ 경로 보기</button>`:''}
    </div>`;
  }

  el.innerHTML=`
    <div class="sc-head" onclick="toggleCard('${id}')">
      <div class="sc-stripe" style="background:${ev.color}"></div>
      <div class="sc-main">
        <div class="sc-time">${ev.time}</div>
        <div class="sc-title">${ev.title}</div>
        <div class="sc-badges">${bHtml}</div>
      </div>
      <div class="sc-arr">›</div>
    </div>
    <div class="sc-body"><div class="sc-inner">
      ${routeHtml}
      ${admHtml}
      ${mapHtml}
      ${confHtml}
      ${btnHtml}
      <div class="sc-details"><ul>${dHtml}</ul></div>
      ${ev.note?`<div class="sc-note">💡 ${ev.note}</div>`:''}
    </div></div>`;
  return el;
}

function toggleCard(id){document.getElementById(id).classList.toggle('open');}

/* ══ LIST RENDER ══ */
const TCLS={ur:'t-ur',bk:'t-bk',in:'t-in',pk:'t-pk',wn:'t-wn'};
const TLBL={ur:'긴급',bk:'예약',in:'정보',pk:'챙기기',wn:'주의'};
function chkSvg(){return`<svg width="11" height="8" viewBox="0 0 11 8" fill="none"><path d="M1 3.5L4 6.5L10 1" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}

function renderList(lid,items,sk){
  const el=document.getElementById('l-'+lid);
  if(!el)return;
  if(!ST[sk])ST[sk]={};
  el.innerHTML='';
  let done=0;
  items.forEach((item,i)=>{
    const isDone=ST[sk][i]??false;
    if(isDone)done++;
    const d=document.createElement('div');
    d.className='item'+(isDone?' done':'');
    const tc=TCLS[item.tag]||'t-in',tl=TLBL[item.tag]||'정보';
    d.innerHTML=`<div class="ichk">${chkSvg()}</div><div class="ibody"><div class="itxt">${esc(item.text)}</div>${item.sub?`<div class="isub">${esc(item.sub)}</div>`:''}</div><span class="itag ${tc}">${tl}</span>`;
    d.addEventListener('click',()=>{ST[sk][i]=!isDone;svST();renderAll();});
    el.appendChild(d);
  });
  const cnt=document.getElementById('c-'+lid);
  if(cnt)cnt.textContent=done+'/'+items.length;
  return{done,total:items.length};
}

// Custom items map: listId → array of items
function getCxList(listId){return ST['cxl_'+listId]||[];}
function renderCxList(listId){
  const el=document.getElementById('l-'+listId);
  if(!el)return;
  getCxList(listId).forEach((item,i)=>{
    const d=document.createElement('div');
    d.className='item'+(item.done?' done':'');
    const tc=TCLS[item.tag||'pk']||'t-pk',tl=TLBL[item.tag||'pk']||'챙기기';
    d.innerHTML=`<div class="ichk">${chkSvg()}</div><div class="ibody"><div class="itxt">${esc(item.text)}</div></div><span class="itag ${tc}">${tl}</span><button class="idel" onclick="delCxList('${listId}',${i},event)">×</button>`;
    d.addEventListener('click',e=>{if(e.target.classList.contains('idel'))return;ST['cxl_'+listId][i].done=!item.done;svST();renderAll();});
    el.appendChild(d);
  });
}
function delCxList(listId,i,e){e.stopPropagation();ST['cxl_'+listId].splice(i,1);svST();renderAll();}

// Category map for add-item
const TODO_CAT_TO_LIST={ur:'ur',tt:'tt',tl:'tl',tm:'tm'};
const CHECK_CAT_TO_LIST={cd:'cd',ch:'ch',cc:'cc',ct:'ct',cw:'cw'};

function renderAll(){
  renderList('ur',TODO.ur,'ur'); renderList('tt',TODO.tt,'tt');
  renderList('tl',TODO.tl,'tl'); renderList('tm',TODO.tm,'tm');
  ['ur','tt','tl','tm'].forEach(l=>renderCxList(l));

  renderList('cd',CHECK.cd,'cd'); renderList('ch',CHECK.ch,'ch');
  renderList('cc',CHECK.cc,'cc'); renderList('ct',CHECK.ct,'ct');
  renderList('cw',CHECK.cw,'cw');
  ['cd','ch','cc','ct','cw'].forEach(l=>renderCxList(l));

  updateProg();
}

function updateProg(){
  let td=0,tt=0,cd=0,ct=0;
  [['ur',TODO.ur],['tt',TODO.tt],['tl',TODO.tl],['tm',TODO.tm]].forEach(([sk,arr])=>arr.forEach((_,i)=>{tt++;if(ST[sk]&&ST[sk][i])td++;}));
  ['ur','tt','tl','tm'].forEach(l=>getCxList(l).forEach(it=>{tt++;if(it.done)td++;}));

  [['cd',CHECK.cd],['ch',CHECK.ch],['cc',CHECK.cc],['ct',CHECK.ct],['cw',CHECK.cw]].forEach(([sk,arr])=>arr.forEach((_,i)=>{ct++;if(ST[sk]&&ST[sk][i])cd++;}));
  ['cd','ch','cc','ct','cw'].forEach(l=>getCxList(l).forEach(it=>{ct++;if(it.done)cd++;}));

  const tp=tt?Math.round(td/tt*100):0,cp=ct?Math.round(cd/ct*100):0;
  document.getElementById('tp-f').style.width=tp+'%';
  document.getElementById('tp-n').textContent=td+'/'+tt;
  document.getElementById('cp-f').style.width=cp+'%';
  document.getElementById('cp-n').textContent=cd+'/'+ct;
  document.getElementById('tbdg').textContent=tt-td;
  document.getElementById('cbdg').textContent=ct-cd;
}

/* ══ ADD ITEM ══ */
function addIt(mode){
  if(mode==='t'){
    const txt=document.getElementById('ti').value.trim();
    if(!txt)return;
    const cat=document.getElementById('todo-cat').value;
    const tag=document.getElementById('todo-tag').value;
    const listId=TODO_CAT_TO_LIST[cat]||'tm';
    if(!ST['cxl_'+listId])ST['cxl_'+listId]=[];
    ST['cxl_'+listId].push({text:txt,tag,done:false});
    svST(); document.getElementById('ti').value=''; renderAll();
  } else {
    const txt=document.getElementById('ci').value.trim();
    if(!txt)return;
    const cat=document.getElementById('check-cat').value;
    const tag=document.getElementById('check-tag').value;
    const listId=CHECK_CAT_TO_LIST[cat]||'cw';
    if(!ST['cxl_'+listId])ST['cxl_'+listId]=[];
    ST['cxl_'+listId].push({text:txt,tag,done:false});
    svST(); document.getElementById('ci').value=''; renderAll();
  }
}
document.getElementById('ti').addEventListener('keydown',e=>{if(e.key==='Enter')addIt('t');});
document.getElementById('ci').addEventListener('keydown',e=>{if(e.key==='Enter')addIt('c');});

/* ══ TAB ══ */
function switchTab(tab){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.querySelectorAll('.tnav').forEach(b=>b.classList.remove('active'));
  document.getElementById('bt-'+tab).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ══ UTIL ══ */
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ══ INIT ══ */
ldST(); buildSched(); renderAll();
</script>
